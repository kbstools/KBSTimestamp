<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timestamper Admin - Logs</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
        
        .login-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #4f46e5, #ff7e00);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        .login-box input:focus {
            outline: none;
            border-color: #4f46e5;
        }
        .login-box button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-box button:hover {
            background: #4338ca;
        }
        .login-error {
            color: #dc3545;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        .login-error.show { display: block; }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-info span {
            font-size: 14px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .main-content { display: none; }
        .main-content.active { display: block; }
        
        header {
            background: linear-gradient(135deg, #4f46e5, #ff7e00);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        h1 { font-size: 1.5em; }
        
        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters select, .filters input {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
        }
        .filters select { min-width: 150px; cursor: pointer; }
        .filters input[type="date"] { cursor: pointer; }
        
        .stats {
            display: flex;
            gap: 20px;
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid #eee;
            flex-wrap: wrap;
        }
        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .stat-value { font-weight: bold; font-size: 1.2em; color: #4f46e5; }
        .stat-label { color: #666; font-size: 0.9em; }
        
        .logs-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .log-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .log-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
        }
        
        .log-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #eee;
            cursor: pointer;
        }
        
        .log-details {
            padding: 15px;
        }
        
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .employee-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #333;
        }
        
        .mode-badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7em;
            font-weight: 600;
            text-transform: uppercase;
        }
        .mode-first { background: #d4edda; color: #155724; }
        .mode-breakout { background: #fff3cd; color: #856404; }
        .mode-breakin { background: #cce5ff; color: #004085; }
        .mode-final { background: #f8d7da; color: #721c24; }
        .mode-other { background: #e2e3e5; color: #383d41; }
        
        .log-info {
            display: grid;
            gap: 6px;
            font-size: 0.85em;
            color: #555;
        }
        
        .log-info-row {
            display: flex;
            gap: 8px;
        }
        .log-info-label {
            color: #888;
            min-width: 70px;
        }
        
        .log-actions {
            padding: 10px 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }
        .btn-map { background: #4f46e5; color: white; }
        .btn-map:hover { background: #4338ca; }
        .btn-delete { background: #dc3545; color: white; }
        .btn-delete:hover { background: #c82333; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal.active { display: flex; }
        .modal-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 8px;
        }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty svg {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="login-error" id="loginError">Invalid email or password</div>
            <input type="email" id="loginEmail" placeholder="Email" />
            <input type="password" id="loginPassword" placeholder="Password" onkeyup="if(event.key==='Enter')login()" />
            <button onclick="login()">Sign In</button>
        </div>
    </div>
    
    <header id="adminHeader" style="display:none;">
        <h1>Timestamper Admin Logs</h1>
        <div class="user-info">
            <span id="userEmail"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    
    <div class="main-content" id="mainContent" style="display:none;">
    <div id="adminContent">
        <div class="login-box">
            <h2>Admin Login</h2>
            <div class="login-error" id="loginError">Invalid email or password</div>
            <input type="email" id="loginEmail" placeholder="Email" />
            <input type="password" id="loginPassword" placeholder="Password" onkeyup="if(event.key==='Enter')login()" />
            <button onclick="login()">Sign In</button>
        </div>
    </div>
    
    <div class="main-content" id="mainContent">
        <header>
            <h1>Timestamper Admin Logs</h1>
            <div class="user-info">
                <span id="userEmail"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>
        <h1>Timestamper Admin Logs</h1>
        <div class="filters">
            <select id="filterBranch">
                <option value="">All Branches</option>
            </select>
            <select id="filterEmployee">
                <option value="">All Employees</option>
            </select>
            <input type="date" id="filterDate" />
            <button class="btn btn-map" onclick="applyFilters()">Filter</button>
            <button class="btn" style="background: #6c757d; color: white;" onclick="clearFilters()">Clear</button>
        </div>
    </header>
    
    <div class="stats">
        <div class="stat">
            <span class="stat-value" id="totalLogs">0</span>
            <span class="stat-label">Total Logs</span>
        </div>
        <div class="stat">
            <span class="stat-value" id="totalEmployees">0</span>
            <span class="stat-label">Employees</span>
        </div>
        <div class="stat">
            <span class="stat-value" id="totalBranches">0</span>
            <span class="stat-label">Branches</span>
        </div>
    </div>
    
    <div class="logs-container" id="logsContainer">
        <div class="loading">Loading logs...</div>
    </div>
    
    <div class="modal" id="imageModal" onclick="closeModal(event)">
        <button class="modal-close">&times;</button>
        <img class="modal-image" id="modalImage" src="" alt="Log photo" />
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA9P-8cAkJOPKCMoDKvQfIOPRRj6sU2rIk",
            authDomain: "kingsbakeshopdatabase.firebaseapp.com",
            projectId: "kingsbakeshopdatabase",
            storageBucket: "kingsbakeshopdatabase.firebasestorage.app",
            databaseURL: "https://kingsbakeshopdatabase-default-rtdb.firebaseio.com",
            appId: "1:256940044664:web:abb651add27a4445ed188d"
        };
        
        const app = firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database(app);
        const storage = firebase.storage(app);
        
        console.log('Firebase initialized');
        
        let allLogs = [];
        
        function login() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (!email || !password) {
                errorEl.textContent = 'Please enter email and password';
                errorEl.classList.add('show');
                return;
            }
            
            errorEl.classList.remove('show');
            
            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    document.getElementById('userEmail').textContent = email;
                })
                .catch(err => {
                    errorEl.textContent = err.message;
                    errorEl.classList.add('show');
                });
        }
        
        function logout() {
            auth.signOut();
            document.getElementById('loginEmail').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('adminHeader').style.display = 'flex';
                document.getElementById('adminContent').style.display = 'block';
                document.getElementById('userEmail').textContent = user.email;
                init();
            } else {
                document.getElementById('loginOverlay').style.display = 'flex';
                document.getElementById('adminHeader').style.display = 'none';
                document.getElementById('adminContent').style.display = 'none';
            }
        });
        let branches = new Set();
        let employees = new Set();
        
        function init() {
            console.log('init called');
            loadLogs();
        }
        
function loadLogs() {
            const container = document.getElementById('logsContainer');
            container.innerHTML = '<div class="loading" id="loadingMsg">Loading logs...</div>';
            
            setTimeout(() => {
                document.getElementById('loadingMsg').textContent = 'Still loading...';
            }, 3000);
            
            database.ref('Logs').once('value')
                .then((snapshot) => {
                    console.log('Got snapshot, exists:', snapshot.exists());
                    const data = snapshot.val();
                    console.log('Data:', data);
                    container.innerHTML = '<div id="result">Snapshot loaded. Check console for data.</div>';
                    
                    if (!snapshot.exists()) {
                        container.innerHTML += '<p>No logs in database</p>';
                        return;
                    }
                    
                    // Show first log key to verify
                    const firstKey = Object.keys(data)[0];
                    container.innerHTML += '<p>First log ID: ' + firstKey + '</p><pre>' + JSON.stringify(data[firstKey], null, 2) + '</pre>';
                })
                .catch((err) => {
                    console.error('Error:', err);
                    container.innerHTML = '<div class="empty">Error: ' + err.message + '</div>';
                });
        }
                    
                    snapshot.forEach((child) => {
                        const log = child.val();
                        log.id = child.key;
                        allLogs.push(log);
                        if (log.branch) branches.add(log.branch);
                        if (log.employee) employees.add(log.employee);
                    });
                    
                    allLogs.sort((a, b) => new Date(b.time) - new Date(a.time));
                    console.log('Sorting done, logs:', allLogs.length);
                    
                    populateFilters();
                    updateStats();
                    
                    container.innerHTML = '<h3>Found ' + allLogs.length + ' logs</h3><pre>' + JSON.stringify(allLogs, null, 2) + '</pre>';
                })
                })
                .catch((err) => {
                    console.error('Load error:', err);
                    container.innerHTML = '<div class="empty">Error: ' + err.message + '</div>';
                });
        }
        
        function populateFilters() {
            const branchSelect = document.getElementById('filterBranch');
            const employeeSelect = document.getElementById('filterEmployee');
            
            branchSelect.innerHTML = '<option value="">All Branches</option>';
            branches.forEach(branch => {
                branchSelect.innerHTML += `<option value="${branch}">${branch}</option>`;
            });
            
            employeeSelect.innerHTML = '<option value="">All Employees</option>';
            employees.forEach(emp => {
                employeeSelect.innerHTML += `<option value="${emp}">${emp}</option>`;
            });
        }
        
        function updateStats() {
            document.getElementById('totalLogs').textContent = allLogs.length;
            document.getElementById('totalEmployees').textContent = employees.size;
            document.getElementById('totalBranches').textContent = branches.size;
        }
        
        function applyFilters() {
            const branch = document.getElementById('filterBranch').value;
            const employee = document.getElementById('filterEmployee').value;
            const date = document.getElementById('filterDate').value;
            
            let filtered = allLogs;
            
            if (branch) {
                filtered = filtered.filter(log => log.branch === branch);
            }
            if (employee) {
                filtered = filtered.filter(log => log.employee === employee);
            }
            if (date) {
                const dateStr = date.replace(/-/g, '');
                filtered = filtered.filter(log => {
                    if (!log.time) return false;
                    const logDate = new Date(log.time).toISOString().split('T')[0].replace(/-/g, '');
                    return logDate === dateStr;
                });
            }
            
            renderLogs(filtered);
        }
        
        function clearFilters() {
            document.getElementById('filterBranch').value = '';
            document.getElementById('filterEmployee').value = '';
            document.getElementById('filterDate').value = '';
            renderLogs(allLogs);
        }
        
        function renderLogs(logs) {
            console.log('renderLogs called with', logs.length, 'logs');
            const container = document.getElementById('logsContainer');
            
            if (logs.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        <p>No logs found</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = logs.map(log => {
                const time = log.time ? new Date(log.time) : new Date(log.id);
                const timeStr = time.toLocaleString();
                const modeClass = getModeBadgeClass(log.mode);
                const modeDisplay = getModeDisplay(log.mode);
                const imageUrl = log.imageUrl || '';
                
                return `
                    <div class="log-card" data-id="${log.id}">
                        <img class="log-image" src="${imageUrl}" alt="Clock ${log.mode}" onclick="openModal('${imageUrl}')" onerror="this.src='https://placehold.co/320x200?text=No+Image'" />
                        <div class="log-details">
                            <div class="log-header">
                                <div class="employee-name">${log.employee || 'Unknown'}</div>
                                <span class="mode-badge ${modeClass}">${modeDisplay}</span>
                            </div>
                            <div class="log-info">
                                <div class="log-info-row">
                                    <span class="log-info-label">Branch:</span>
                                    <span>${log.branch || '-'}</span>
                                </div>
                                <div class="log-info-row">
                                    <span class="log-info-label">Time:</span>
                                    <span>${timeStr}</span>
                                </div>
                                <div class="log-info-row">
                                    <span class="log-info-label">Location:</span>
                                    <span>${log.address || log.gpsCoords || '-'}</span>
                                </div>
                            </div>
                        </div>
                        <div class="log-actions">
                            <button class="btn btn-map" onclick="openMaps('${log.gpsCoords || ''}')">Map</button>
                            <button class="btn btn-delete" onclick="deleteLog('${log.id}')">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function getModeBadgeClass(mode) {
            if (mode === 'FIRST IN') return 'mode-first';
            if (mode === 'BREAK OUT') return 'mode-breakout';
            if (mode === 'BREAK IN') return 'mode-breakin';
            if (mode === 'FINAL OUT') return 'mode-final';
            return 'mode-other';
        }
        
        function getModeDisplay(mode) {
            const modeMap = {
                'FIRST IN': 'First In',
                'BREAK OUT': 'Break Out',
                'BREAK IN': 'Break In',
                'FINAL OUT': 'Final Out'
            };
            return modeMap[mode] || mode || '?';
        }
        
        function openModal(url) {
            if (!url) return;
            document.getElementById('modalImage').src = url;
            document.getElementById('imageModal').classList.add('active');
        }
        
        function closeModal(e) {
            if (e.target.classList.contains('modal') || e.target.classList.contains('modal-close')) {
                document.getElementById('imageModal').classList.remove('active');
            }
        }
        
        function openMaps(coords) {
            if (!coords) {
                alert('No GPS coordinates available');
                return;
            }
            const [lat, lng] = coords.split(',').map(s => s.trim());
            if (lat && lng) {
                window.open(`https://www.google.com/maps?q=${lat},${lng}`, '_blank');
            } else {
                alert('Invalid GPS coordinates');
            }
        }
        
        function deleteLog(id) {
            if (!confirm('Are you sure you want to delete this log?')) return;
            
            database.ref('Logs/' + id).remove()
                .then(() => {
                    alert('Log deleted successfully');
                    loadLogs();
                })
                .catch(err => {
                    alert('Error deleting log: ' + err.message);
                });
        }
    </script>
</div>
</body>
</html>
