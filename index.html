<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakeshop Verified Cam</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; 
            background: #1a1a1a; 
            color: white; 
            margin: 0; 
            padding: 0;
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #viewfinder { 
            width: 100%; 
            height: auto;
            flex-shrink: 0;
            aspect-ratio: 16/9;
            object-fit: cover; 
            background: #000; 
            border-bottom: 2px solid #ff6600; 
        }
        
        .controls { 
            flex: 1;
            min-height: 0;
            padding: 15px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start;
            background: #222;
            gap: 10px;
            overflow-y: auto;
        }
        
        select { 
            width: 90%; 
            max-width: 300px;
            padding: 10px; 
            border-radius: 8px; 
            border: 1px solid #444; 
            background: #333; 
            color: white; 
            font-size: 14px;
            flex-shrink: 0;
        }
        
        #capture-btn { 
            background: #ff6600; 
            border: none; 
            color: white; 
            width: 70px; 
            height: 70px; 
            border-radius: 50%; 
            font-weight: bold; 
            font-size: 12px; 
            cursor: pointer; 
            box-shadow: 0 0 20px rgba(255,102,0,0.4);
            transition: transform 0.1s;
            flex-shrink: 0;
        }
        
        #capture-btn:active { 
            transform: scale(0.95); 
        }
        
        #capture-btn:disabled { 
            opacity: 0.6; 
            cursor: not-allowed; 
        }
        
        #status { 
            font-size: 12px; 
            color: #aaa; 
            text-align: center;
            flex-shrink: 0;
            width: 90%;
            max-width: 300px;
        }
        
        #gps-status { 
            font-size: 11px; 
            color: #ff8c00; 
            font-weight: bold;
            text-align: center;
            flex-shrink: 0;
            width: 90%;
            max-width: 300px;
        }
        
        #debug { 
            font-size: 9px; 
            color: #888;
            width: 95%;
            max-width: 400px;
            height: 120px;
            border: 1px solid #444; 
            background: #1a1a1a;
            padding: 8px;
            border-radius: 4px;
            overflow-y: auto;
            flex-shrink: 0;
            line-height: 1.3;
            font-family: 'Courier New', monospace;
        }
        
        #debug div {
            margin: 2px 0;
            padding: 2px 0;
            border-bottom: 1px solid #333;
        }
        
        #canvas { 
            display: none; 
        }

        /* Mobile optimizations */
        @media (max-height: 600px) {
            #viewfinder {
                height: auto;
                aspect-ratio: 4/3;
            }
            
            .controls {
                padding: 10px;
                gap: 8px;
            }
            
            #debug {
                height: 80px;
                font-size: 8px;
            }
            
            #capture-btn {
                width: 60px;
                height: 60px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>

    <video id="viewfinder" autoplay playsinline muted webkit-playsinline></video>
    
    <div class="controls">
        <select id="branchSelect">
            <option value="BK-ADMIN">-- Select Branch --</option>
            <option value="BK-01-Manila">BK-01 Manila</option>
            <option value="BK-02-QC">BK-02 Quezon City</option>
            <option value="BK-03-Makati">BK-03 Makati</option>
        </select>

        <button id="capture-btn">SNAP & SYNC</button>
        <div id="status">System Ready</div>
        <div id="gps-status">🔴 GPS: Acquiring...</div>
        <div id="debug"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getDatabase, ref as dbRef, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9P-8cAkJOPKCMoDKvQfIOPRRj6sU2rIk",
            authDomain: "kingsbakeshopdatabase.firebaseapp.com",
            projectId: "kingsbakeshopdatabase",
            storageBucket: "kingsbakeshopdatabase.firebasestorage.app",
            messagingSenderId: "256940044664",
            appId: "1:256940044664:web:abb651add27a4445ed188d",
            measurementId: "G-YDS7TH7N44"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const database = getDatabase(app);

        const video = document.getElementById('viewfinder');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const gpsStatus = document.getElementById('gps-status');
        const captureBtn = document.getElementById('capture-btn');
        const debugDiv = document.getElementById('debug');
        
        let currentGPS = "Acquiring GPS...";
        let cameraReady = false;
        let gpsReady = false;
        let logCount = 0;

        function addDebug(msg) {
            console.log(`[DEBUG] ${msg}`);
            const time = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.textContent = `${time}: ${msg}`;
            debugDiv.appendChild(logEntry);
            
            // Keep only last 15 logs to prevent memory issues
            logCount++;
            if (logCount > 15) {
                const firstChild = debugDiv.firstChild;
                if (firstChild) firstChild.remove();
                logCount--;
            }
            
            // Auto-scroll to bottom
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function getQuarter(date) {
            const month = date.getMonth();
            return Math.ceil((month + 1) / 3);
        }

        async function initSystem() {
            addDebug("System initializing...");
            
            try {
                // Camera Setup
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        cameraReady = true;
                        addDebug("✓ Camera ready");
                        updateUIStatus();
                    };
                } catch (cameraErr) {
                    status.innerText = "❌ Camera Error";
                    addDebug(`Camera Error: ${cameraErr.message}`);
                    captureBtn.disabled = true;
                }

                // GPS Setup
                addDebug("Requesting GPS...");
                
                const gpsTimeout = setTimeout(() => {
                    addDebug("⚠ GPS timeout - proceeding");
                    gpsStatus.innerText = "⚠ GPS: Unavailable";
                    gpsReady = true;
                    updateUIStatus();
                }, 20000);

                navigator.geolocation.watchPosition(
                    (pos) => {
                        clearTimeout(gpsTimeout);
                        currentGPS = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                        gpsStatus.innerText = `✓ GPS: ${currentGPS}`;
                        gpsReady = true;
                        addDebug(`✓ GPS acquired: ${currentGPS}`);
                        updateUIStatus();
                    },
                    (gpsErr) => {
                        addDebug(`GPS Error Code ${gpsErr.code}: ${gpsErr.message}`);
                        if (gpsErr.code === 1) {
                            gpsStatus.innerText = "❌ GPS: Permission Denied";
                            addDebug("Enable GPS in settings");
                        } else if (gpsErr.code === 2) {
                            gpsStatus.innerText = "⚠ GPS: Position Unavailable";
                            addDebug("Try outdoor location");
                        } else {
                            gpsStatus.innerText = "⚠ GPS: Timeout";
                        }
                        gpsReady = true;
                        updateUIStatus();
                    },
                    { 
                        enableHighAccuracy: true,
                        timeout: 20000,
                        maximumAge: 0
                    }
                );

            } catch (err) {
                addDebug(`Init Error: ${err.message}`);
            }
        }

        function updateUIStatus() {
            if (cameraReady) {
                captureBtn.disabled = false;
                status.innerText = "Ready to Capture";
            }
        }

        captureBtn.addEventListener('click', async () => {
            const branch = document.getElementById('branchSelect').value;
            if (branch === "BK-ADMIN") {
                alert("Please select a branch first!");
                return;
            }

            captureBtn.disabled = true;
            status.innerText = "Processing...";
            addDebug(`Capturing for: ${branch}`);

            try {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.drawImage(video, 0, 0);

                // Watermark
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, canvas.height - 130, canvas.width, 130);
                
                ctx.fillStyle = "#FF8C00";
                const now = new Date();
                
                ctx.font = "bold 32px Arial";
                const timeStr = now.toLocaleString('en-PH');
                ctx.fillText(timeStr, 30, canvas.height - 85);
                
                ctx.font = "28px Arial";
                ctx.fillText(`BRANCH: ${branch}`, 30, canvas.height - 45);
                
                ctx.font = "italic 22px Arial";
                ctx.fillText(`GPS: ${currentGPS}`, 30, canvas.height - 15);

                const quarter = `Q${getQuarter(now)}`;
                const year = now.getFullYear();
                const fileName = `Records/${year}/${quarter}/${branch}/${Date.now()}.jpg`;
                const storageRef = ref(storage, fileName);

                addDebug(`Uploading: ${fileName}`);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

                // Upload to Storage
                const snapshot = await uploadString(storageRef, dataUrl, 'data_url');
                const downloadURL = await getDownloadURL(snapshot.ref);
                addDebug(`✓ Photo uploaded`);

                // Save to Database
                const recordId = Date.now().toString();
                const dbPath = `liveFeed/${recordId}`;
                
                addDebug(`Saving to DB...`);
                
                await set(dbRef(database, dbPath), {
                    url: downloadURL,
                    branch: branch,
                    timestamp: now.toISOString(),
                    gps: currentGPS,
                    createdAt: new Date().toISOString()
                });

                addDebug("✓ Sync complete!");
                status.innerText = "✅ Synced!";
                
                setTimeout(() => {
                    status.innerText = "Ready to Capture";
                    captureBtn.disabled = false;
                }, 2000);

            } catch (err) {
                addDebug(`ERROR: ${err.message}`);
                status.innerText = `Error: ${err.message}`;
                captureBtn.disabled = false;
            }
        });

        initSystem();
    </script>
</body>
</html>
