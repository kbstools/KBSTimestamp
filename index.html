<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakeshop Verified Cam</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #viewfinder { width: 100%; height: 60vh; object-fit: cover; background: #000; border-bottom: 2px solid #ff6600; }
        .controls { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; background: #222; }
        select { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 16px; margin-bottom: 10px; }
        #capture-btn { background: #ff6600; border: none; color: white; width: 85px; height: 85px; border-radius: 50%; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 0 20px rgba(255,102,0,0.4); active { transform: scale(0.95); } }
        #status { font-size: 13px; color: #aaa; margin-top: 5px; }
        #canvas { display: none; }
    </style>
</head>
<body>

    <video id="viewfinder" autoplay playsinline muted webkit-playsinline></video>
    
    <div class="controls">
        <select id="branchSelect">
            <option value="BK-ADMIN">-- Select Branch --</option>
            <option value="BK-01-Manila">BK-01 Manila</option>
            <option value="BK-02-QC">BK-02 Quezon City</option>
            <option value="BK-03-Makati">BK-03 Makati</option>
        </select>

        <button id="capture-btn">SNAP & SYNC</button>
        <div id="status">System Ready</div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getDatabase, ref as dbRef, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE YOUR FIREBASE CONFIG FROM GOOGLE CONSOLE HERE ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            databaseURL: "YOUR_DATABASE_URL"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const database = getDatabase(app);

        const video = document.getElementById('viewfinder');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        let currentGPS = "Acquiring GPS...";

        // 2. Start Camera & GPS immediately
        async function initSystem() {
            try {
                // Request Camera
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => video.play();

                // Request GPS
                navigator.geolocation.watchPosition(
                    (pos) => { currentGPS = `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`; },
                    () => { currentGPS = "GPS Denied"; },
                    { enableHighAccuracy: true }
                );
            } catch (err) {
                status.innerText = "Error: Please check Camera/GPS permissions.";
            }
        }

        // 3. The Capture & Watermark Logic
        document.getElementById('capture-btn').addEventListener('click', async () => {
            const branch = document.getElementById('branchSelect').value;
            if (branch === "BK-ADMIN") return alert("Please select a branch first!");

            status.innerText = "Processing Timemark...";
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            
            // Draw original photo
            ctx.drawImage(video, 0, 0);

            // Create Watermark Bar
            ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
            ctx.fillRect(0, canvas.height - 130, canvas.width, 130);
            
            ctx.fillStyle = "#FF8C00"; // Signature Timemark Orange
            const now = new Date();
            
            ctx.font = "bold 34px Arial";
            ctx.fillText(now.toLocaleString(), 30, canvas.height - 85); // Line 1: Time
            
            ctx.font = "30px Arial";
            ctx.fillText(`BRANCH: ${branch}`, 30, canvas.height - 45); // Line 2: Store
            
            ctx.font = "italic 24px Arial";
            ctx.fillText(`VERIFIED AT: ${currentGPS}`, 30, canvas.height - 15); // Line 3: GPS

            // 4. Quarterly Organized Upload
            const quarter = "Q" + Math.floor((now.getMonth() + 3) / 3);
            const year = now.getFullYear();
            const fileName = `Records/${year}/${quarter}/${branch}/${Date.now()}.jpg`;
            const storageRef = ref(storage, fileName);

            const dataUrl = canvas.toDataURL('image/jpeg', 0.6); // 60% compression for 30-store storage speed

            status.innerText = "Uploading to Cloud...";
            try {
                const snapshot = await uploadString(storageRef, dataUrl, 'data_url');
                const downloadURL = await getDownloadURL(snapshot.ref);
                
                // Save to Database for your Admin Dashboard
                await push(dbRef(database, 'liveFeed'), {
                    url: downloadURL,
                    branch: branch,
                    timestamp: now.toISOString(),
                    gps: currentGPS
                });

                status.innerText = "✅ Verified & Synced!";
                setTimeout(() => { status.innerText = "System Ready"; }, 3000);
            } catch (error) {
                status.innerText = "Upload Failed. Check Internet.";
            }
        });

        initSystem();
    </script>
</body>
</html>
