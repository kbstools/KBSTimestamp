<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bakeshop Verified Cam</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #viewfinder { width: 100%; height: 60vh; object-fit: cover; background: #000; border-bottom: 2px solid #ff6600; }
        .controls { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: space-around; background: #222; }
        select { width: 90%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; font-size: 16px; margin-bottom: 10px; }
        #capture-btn { background: #ff6600; border: none; color: white; width: 85px; height: 85px; border-radius: 50%; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 0 20px rgba(255,102,0,0.4); }
        #capture-btn:active { transform: scale(0.95); }
        #capture-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        #status { font-size: 13px; color: #aaa; margin-top: 5px; }
        #gps-status { font-size: 12px; color: #ff8c00; margin-top: 5px; font-weight: bold; }
        #debug { font-size: 10px; color: #666; margin-top: 10px; max-height: 50px; overflow-y: auto; border: 1px solid #444; padding: 5px; border-radius: 4px; }
        #canvas { display: none; }
    </style>
</head>
<body>

    <video id="viewfinder" autoplay playsinline muted webkit-playsinline></video>
    
    <div class="controls">
        <select id="branchSelect">
            <option value="BK-ADMIN">-- Select Branch --</option>
            <option value="BK-01-Manila">BK-01 Manila</option>
            <option value="BK-02-QC">BK-02 Quezon City</option>
            <option value="BK-03-Makati">BK-03 Makati</option>
        </select>

        <button id="capture-btn">SNAP & SYNC</button>
        <div id="status">System Ready</div>
        <div id="gps-status">🔴 GPS: Acquiring...</div>
        <div id="debug"></div>
    </div>

    <canvas id="canvas"></canvas>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getDatabase, ref as dbRef, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA9P-8cAkJOPKCMoDKvQfIOPRRj6sU2rIk",
            authDomain: "kingsbakeshopdatabase.firebaseapp.com",
            projectId: "kingsbakeshopdatabase",
            storageBucket: "kingsbakeshopdatabase.firebasestorage.app",
            messagingSenderId: "256940044664",
            appId: "1:256940044664:web:abb651add27a4445ed188d",
            measurementId: "G-YDS7TH7N44"
        };

        const app = initializeApp(firebaseConfig);
        const storage = getStorage(app);
        const database = getDatabase(app);

        const video = document.getElementById('viewfinder');
        const canvas = document.getElementById('canvas');
        const status = document.getElementById('status');
        const gpsStatus = document.getElementById('gps-status');
        const captureBtn = document.getElementById('capture-btn');
        const debugDiv = document.getElementById('debug');
        
        let currentGPS = "Acquiring GPS...";
        let cameraReady = false;
        let gpsReady = false;

        function addDebug(msg) {
            console.log(`[DEBUG] ${msg}`);
            debugDiv.innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
            debugDiv.scrollTop = debugDiv.scrollHeight;
        }

        function getQuarter(date) {
            const month = date.getMonth();
            return Math.ceil((month + 1) / 3);
        }

        // FIXED: Proper GPS handling with better error messages
        async function initSystem() {
            addDebug("System initializing...");
            
            try {
                // Camera Setup
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "environment" }, 
                        audio: false 
                    });
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        video.play();
                        cameraReady = true;
                        addDebug("✓ Camera ready");
                        updateUIStatus();
                    };
                } catch (cameraErr) {
                    status.innerText = "❌ Camera Error";
                    addDebug(`Camera Error: ${cameraErr.message}`);
                    captureBtn.disabled = true;
                }

                // GPS Setup - FIXED with explicit permission request
                addDebug("Requesting GPS...");
                
                const gpsTimeout = setTimeout(() => {
                    addDebug("⚠ GPS timeout - proceeding without GPS");
                    gpsStatus.innerText = "⚠ GPS: Unavailable";
                    gpsReady = true;
                    updateUIStatus();
                }, 20000);

                // Use watchPosition for continuous location updates
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        clearTimeout(gpsTimeout);
                        currentGPS = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                        gpsStatus.innerText = `✓ GPS: ${currentGPS}`;
                        gpsReady = true;
                        addDebug(`✓ GPS acquired: ${currentGPS}`);
                        updateUIStatus();
                    },
                    (gpsErr) => {
                        addDebug(`GPS Error Code ${gpsErr.code}: ${gpsErr.message}`);
                        if (gpsErr.code === 1) {
                            gpsStatus.innerText = "❌ GPS: Permission Denied";
                            addDebug("GPS permission denied - check device settings");
                        } else if (gpsErr.code === 2) {
                            gpsStatus.innerText = "⚠ GPS: Position Unavailable";
                            addDebug("GPS position unavailable - try outdoor");
                        } else {
                            gpsStatus.innerText = "⚠ GPS: Timeout";
                        }
                        gpsReady = true;
                        updateUIStatus();
                    },
                    { 
                        enableHighAccuracy: true,
                        timeout: 20000,
                        maximumAge: 0
                    }
                );

            } catch (err) {
                addDebug(`Init Error: ${err.message}`);
            }
        }

        function updateUIStatus() {
            if (cameraReady) {
                captureBtn.disabled = false;
                status.innerText = "Ready to Capture";
            }
        }

        // FIXED: Better upload error handling
        captureBtn.addEventListener('click', async () => {
            const branch = document.getElementById('branchSelect').value;
            if (branch === "BK-ADMIN") {
                alert("Please select a branch first!");
                return;
            }

            captureBtn.disabled = true;
            status.innerText = "Processing...";
            addDebug(`Capturing for branch: ${branch}`);

            try {
                const ctx = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                ctx.drawImage(video, 0, 0);

                // Watermark
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, canvas.height - 130, canvas.width, 130);
                
                ctx.fillStyle = "#FF8C00";
                const now = new Date();
                
                ctx.font = "bold 32px Arial";
                const timeStr = now.toLocaleString('en-PH');
                ctx.fillText(timeStr, 30, canvas.height - 85);
                
                ctx.font = "28px Arial";
                ctx.fillText(`BRANCH: ${branch}`, 30, canvas.height - 45);
                
                ctx.font = "italic 22px Arial";
                ctx.fillText(`GPS: ${currentGPS}`, 30, canvas.height - 15);

                const quarter = `Q${getQuarter(now)}`;
                const year = now.getFullYear();
                const fileName = `Records/${year}/${quarter}/${branch}/${Date.now()}.jpg`;
                const storageRef = ref(storage, fileName);

                addDebug(`Uploading to: ${fileName}`);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);

                // Upload to Storage
                const snapshot = await uploadString(storageRef, dataUrl, 'data_url');
                const downloadURL = await getDownloadURL(snapshot.ref);
                addDebug(`✓ File uploaded: ${fileName}`);

                // FIXED: Save to Database with explicit error handling
                const recordId = Date.now().toString();
                const dbPath = `liveFeed/${recordId}`;
                
                addDebug(`Writing to database: ${dbPath}`);
                
                await set(dbRef(database, dbPath), {
                    url: downloadURL,
                    branch: branch,
                    timestamp: now.toISOString(),
                    gps: currentGPS,
                    createdAt: new Date().toISOString()
                });

                addDebug("✓ Database write successful!");
                status.innerText = "✅ Synced!";
                
                setTimeout(() => {
                    status.innerText = "Ready to Capture";
                    captureBtn.disabled = false;
                }, 2000);

            } catch (err) {
                addDebug(`❌ Error: ${err.message}`);
                status.innerText = `Error: ${err.message}`;
                captureBtn.disabled = false;
            }
        });

        initSystem();
    </script>
</body>
</html>
